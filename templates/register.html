{% extends "base.html" %}
{% block title %}Sign up &middot; QuizForge{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8 bg-white border border-slate-200 rounded-lg p-6">
  <h1 class="text-2xl font-bold mb-4">Create an account</h1>
  <form method="post" class="space-y-3">
    <div>
      <label class="block text-sm font-medium mb-1">Name</label>
      <input type="text" name="name" value="{{ form.name or '' }}"
             class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" value="{{ form.email or '' }}" required
             class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password (min 6)</label>
      <input type="password" name="password" required minlength="6"
             class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
    </div>
    <button class="w-full py-2 bg-brand-600 text-white rounded hover:bg-brand-700">Create account</button>
  </form>
  <p class="mt-4 text-sm text-slate-600">Already registered? <a href="{{ url_for('login') }}" class="text-brand-700 hover:underline">Sign in</a></p>
</div>
{% endblock %}
