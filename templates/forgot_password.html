{% extends "base.html" %}
{% block title %}Forgot password &middot; QuizForge{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8 bg-white border border-slate-200 rounded-lg p-6">
  <h1 class="text-2xl font-bold mb-2">Forgot your password?</h1>
  <p class="text-sm text-slate-600 mb-4">Enter the email you signed up with and we'll send you a one-time reset link (expires in 15 minutes).</p>
  <form method="post" class="space-y-3">
    <input type="email" name="email" required autofocus placeholder="you@example.com"
           class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
    <button class="w-full py-2 bg-brand-600 text-white rounded hover:bg-brand-700">Send reset link</button>
  </form>
  <p class="mt-4 text-sm text-slate-500 text-center">
    <a href="{{ url_for('login') }}" class="text-brand-700 hover:underline">Back to sign in</a>
  </p>
</div>
{% endblock %}
