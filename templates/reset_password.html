{% extends "base.html" %}
{% block title %}Reset your password &middot; QuizForge{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8 bg-white border border-slate-200 rounded-lg p-6">
  <h1 class="text-2xl font-bold mb-2">Set a new password</h1>
  <p class="text-sm text-slate-600 mb-4">Choose a strong password (minimum 6 characters). This link is single-use.</p>
  <form method="post" class="space-y-3">
    <input type="password" name="password" required minlength="6" autofocus placeholder="New password"
           class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
    <button class="w-full py-2 bg-brand-600 text-white rounded hover:bg-brand-700">Update password</button>
  </form>
</div>
{% endblock %}
