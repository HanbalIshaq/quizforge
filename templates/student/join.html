{% extends "base.html" %}
{% block title %}Join a quiz{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white border border-slate-200 rounded-lg p-8 text-center">
  <h1 class="text-2xl font-bold mb-2">Join a quiz or live session</h1>
  <p class="text-sm text-slate-500 mb-6">Enter the code you were given.</p>
  <form method="post" class="space-y-3">
    <input name="code" required autocomplete="off" autofocus
           class="w-full text-center text-2xl font-mono tracking-widest uppercase px-4 py-3 border-2 border-slate-300 rounded-lg focus:border-brand-500 focus:ring-2 focus:ring-brand-500"
           placeholder="ABC123" />
    <button class="w-full py-3 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">Join</button>
  </form>
</div>
{% endblock %}
