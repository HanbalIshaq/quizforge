{% extends "base.html" %}
{% block title %}Password required &middot; {{ quiz.title }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white border border-slate-200 rounded-lg p-8">
  <h1 class="text-xl font-bold mb-1">{{ quiz.title }}</h1>
  <p class="text-sm text-slate-500 mb-5">This quiz requires a password to start.</p>
  <form method="post" class="space-y-3">
    <input type="password" name="__password" required autofocus
           class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
           placeholder="Quiz password" />
    <button class="w-full py-2 bg-brand-600 text-white rounded hover:bg-brand-700">Continue</button>
  </form>
</div>
{% endblock %}
