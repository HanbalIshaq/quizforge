{% extends "base.html" %}
{% block title %}Sign in &middot; QuizForge{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8 bg-white border border-slate-200 rounded-lg p-6">
  <h1 class="text-2xl font-bold mb-4">Sign in</h1>
  <form method="post" class="space-y-3">
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" value="{{ form.email or '' }}" required
             class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" required
             class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
    </div>
    <button class="w-full py-2 bg-brand-600 text-white rounded hover:bg-brand-700">Sign in</button>
  </form>
  <p class="mt-4 text-sm text-slate-600">No account? <a href="{{ url_for('register') }}" class="text-brand-700 hover:underline">Sign up</a></p>
</div>
{% endblock %}
